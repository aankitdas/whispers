<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <defs>
    <!-- Font Import -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&amp;family=DM+Sans:wght@300;400;500&amp;display=swap');

      /* Styles */
      .bg {
        fill: #FAF6F0;
      }
      .title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 300;
        fill: #2C2C2C;
        font-size: 64px;
        letter-spacing: 0.05em;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 2s ease-out forwards;
      }
      .subtitle {
        font-family: 'DM Sans', sans-serif;
        font-weight: 300;
        fill: #4A4A4A;
        font-size: 16px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 2.5s ease-out 0.5s forwards;
      }
      .for-jen {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        fill: #C9A84C;
        font-size: 20px;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 3s ease-out 1s forwards;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes floatPetal-1 {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translate(-120px, -240px) rotate(360deg); opacity: 0; }
      }

      @keyframes floatPetal-2 {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { transform: translate(140px, -260px) rotate(-240deg); opacity: 0; }
      }

      @keyframes floatPetal-3 {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
        20% { opacity: 0.7; }
        80% { opacity: 0.7; }
        100% { transform: translate(-80px, -280px) rotate(180deg); opacity: 0; }
      }

      @keyframes pulseGlow {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.15); opacity: 0.8; }
      }

      @keyframes lanternSway {
        0%, 100% { transform: rotate(-3deg); }
        50% { transform: rotate(3deg); }
      }

      /* Petal Classes */
      .petal {
        fill: #E8C4B8;
        opacity: 0;
      }
      .petal-sage {
        fill: #A8B5A0;
      }
      .petal-gold {
        fill: #E8D5A3;
      }

      .p1 { animation: floatPetal-1 14s infinite linear; }
      .p2 { animation: floatPetal-2 16s infinite linear 3s; }
      .p3 { animation: floatPetal-3 18s infinite linear 6s; }
      .p4 { animation: floatPetal-1 15s infinite linear 8s; }
      .p5 { animation: floatPetal-2 13s infinite linear 10s; }
      .p6 { animation: floatPetal-3 17s infinite linear 12s; }

      /* Glow & Lantern */
      .glow-orb {
        fill: #C9A84C;
        transform-origin: 400px 160px;
        animation: pulseGlow 6s infinite ease-in-out;
      }
      
      .sparkle {
        fill: #C9A84C;
        opacity: 0.8;
      }
    </style>

    <!-- Drop Shadow for soft paper feel -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2C2C2C" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Subtle noise-like circle in background -->
  <circle cx="400" cy="160" r="140" fill="none" stroke="#E8C4B8" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="4 8" />
  <circle cx="400" cy="160" r="143" fill="none" stroke="#A8B5A0" stroke-opacity="0.15" stroke-width="1" />

  <!-- Ambient Glow -->
  <circle cx="400" cy="155" r="40" class="glow-orb" filter="blur(25px)" />

  <!-- Floating Petals (Animate from various starting positions around bottom) -->
  <!-- Left Side spawns -->
  <g transform="translate(180, 310)">
    <path class="petal p1" d="M 0,0 C -5,-10 -15,-15 -20,-5 C -25,5 -10,15 0,0" />
  </g>
  <g transform="translate(260, 330)">
    <path class="petal petal-sage p3" d="M 0,0 C 5,-8 12,-12 18,-4 C 20,4 8,12 0,0" />
  </g>
  
  <!-- Right Side spawns -->
  <g transform="translate(620, 300)">
    <path class="petal petal-gold p2" d="M 0,0 C 8,-8 15,-5 10,5 C 5,12 -5,8 0,0" />
  </g>
  <g transform="translate(540, 340)">
    <path class="petal p5" d="M 0,0 C -8,-6 -12,-15 -4,-18 C 4,-20 8,-8 0,0" />
  </g>

  <!-- Middle/Lower spawns -->
  <g transform="translate(450, 320)">
    <path class="petal petal-sage p4" d="M 0,0 C -5,-8 -12,-12 -18,-4 C -20,4 -8,12 0,0" />
  </g>
  <g transform="translate(350, 300)">
    <path class="petal petal-gold p6" d="M 0,0 C 6,-6 12,-4 8,4 C 4,10 -4,8 0,0" />
  </g>

  <!-- Decorative sparkles -->
  <path class="sparkle" transform="translate(340, 110) scale(0.6)" d="M10,0 L13,7 L20,10 L13,13 L10,20 L7,13 L0,10 L7,7 Z" />
  <path class="sparkle" transform="translate(450, 200) scale(0.4)" d="M10,0 L13,7 L20,10 L13,13 L10,20 L7,13 L0,10 L7,7 Z" />
  <path class="sparkle" transform="translate(430, 95) scale(0.5)" d="M10,0 L13,7 L20,10 L13,13 L10,20 L7,13 L0,10 L7,7 Z" />

  <!-- Text Group -->
  <g transform="translate(0, 5)">
    <!-- Main Title -->
    <text x="400" y="150" class="title">Whispers</text>
    
    <!-- Subtitle -->
    <text x="400" y="195" class="subtitle">Gentle moments captured across the distance</text>
    
    <!-- Dedicated tag -->
    <text x="400" y="235" class="for-jen">for Jennifer Lane ✦</text>
  </g>

  <!-- Little Branch Ornament at bottom-center -->
  <path d="M 370, 260 C 385,258 415,258 430,260" fill="none" stroke="#2C2C2C" stroke-width="0.75" stroke-opacity="0.25" />
  <circle cx="400" cy="259" r="1.5" fill="#C9A84C" />
  <circle cx="385" cy="259" r="1" fill="#A8B5A0" />
  <circle cx="415" cy="259" r="1" fill="#A8B5A0" />
</svg>
